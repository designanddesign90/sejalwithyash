<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save The Date - Wedding Countdown</title>
    <!-- Google Fonts for Elegant Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #7d6352; /* Elegant Taupe/Gold */
            --accent-color: #d4af37; /* Metallic Gold */
            --bg-color: #fff9f6; /* Soft Blush/Cream */
            --text-color: #4a4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(253, 239, 233, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(245, 223, 217, 0.5) 0%, transparent 50%);
        }

        /* Outer Card Container */
        .invitation-container {
            text-align: center;
            background: white;
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(125, 99, 82, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            max-width: 600px;
            width: 90%;
            position: relative;
            animation: fadeIn 1.5s ease-out;
        }

        /* Decorative Floral/Border Accents */
        .invitation-container::before {
            content: '';
            position: absolute;
            top: 15px;
            bottom: 15px;
            left: 15px;
            right: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            pointer-events: none;
        }

        /* Typography */
        .badge {
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .couple-names {
            font-family: 'Alex Brush', cursive;
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .wedding-details {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        /* Countdown Grid */
        .countdown-wrapper {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 2.5rem 0;
        }

        .countdown-box {
            background: #fffbf9;
            border: 1px solid rgba(125, 99, 82, 0.1);
            padding: 1rem 0.5rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
        }

        .countdown-box:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .time-number {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary-color);
            display: block;
            margin-bottom: 2px;
        }

        .time-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }

        /* RSVP / Action Button */
        .btn-rsvp {
            display: inline-block;
            padding: 0.8rem 2.5rem;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(125, 99, 82, 0.2);
        }

        .btn-rsvp:hover {
            background: white;
            color: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(125, 99, 82, 0.1);
        }

        #expired-message {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: 600;
            display: none;
            letter-spacing: 1px;
            margin: 2rem 0;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .couple-names { font-size: 3rem; }
            .wedding-details { font-size: 0.9rem; }
            .time-number { font-size: 1.5rem; }
            .time-label { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <div class="invitation-container">
        <span class="badge">Save The Date</span>
        
        <!-- Customize Names Here -->
        <h1 class="couple-names">Alexander & Charlotte</h1>
        
        <p class="wedding-details">Are getting married</p>
        
        <!-- Live Countdown Timer -->
        <div class="countdown-wrapper" id="countdown-grid">
            <div class="countdown-box">
                <span class="time-number" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="countdown-box">
                <span class="time-number" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="countdown-box">
                <span class="time-number" id="minutes">00</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="countdown-box">
                <span class="time-number" id="seconds">00</span>
                <span class="time-label">Secs</span>
            </div>
        </div>

        <!-- Expired Message -->
        <div id="expired-message">The Celebration Has Begun! 🎉</div>

        <!-- Wedding Date Display -->
        <p style="letter-spacing: 1px; font-weight: 300; margin-bottom: 1.5rem;">
            June 26, 2026 &bull; 8:30 PM
        </p>

        <a href="#" class="btn-rsvp">View Invitation</a>
    </div>

    <script>
        // Set the targeted wedding date and time (June 26, 2026, at 20:30)
        const targetDate = new Date("June 26, 2026 20:30:00").getTime();

        const countdownInterval = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // Time calculations for days, hours, minutes and seconds
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Display results with leading zeros
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // If the countdown is finished
            if (difference < 0) {
                clearInterval(countdownInterval);
                document.getElementById("countdown-grid").style.display = "none";
                document.getElementById("expired-message").style.display = "block";
            }
        }, 1000);
    </script>

</body>
</html>
